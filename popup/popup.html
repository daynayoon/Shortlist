<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shortlist Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">📌</span>
      <h1>Shortlist</h1>
    </div>

    <label for="sheet-id">Google Spreadsheet ID</label>
    <input
      type="text"
      id="sheet-id"
      placeholder="Paste your Spreadsheet ID here"
      autocomplete="off"
      spellcheck="false"
    />
    <p class="hint">
      Find this in your Sheets URL:<br />
      <code>/spreadsheets/d/<strong>{ID}</strong>/edit</code>
    </p>

    <button id="save-btn">Save</button>
    <p id="status" class="status"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
