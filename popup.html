<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Shortlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #FFF6EE;
      --pink:    #FF7BAC;
      --pink-lt: #FFD6E7;
      --mint:    #7DD8C0;
      --mint-lt: #C8F0E7;
      --peach:   #FFB085;
      --text:    #3D2C2C;
      --muted:   #B09898;
      --card:    #FFFFFF;
      --border:  #F0DEDE;
      --shadow:  rgba(255, 123, 172, 0.15);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--text);
      width: 340px;
      min-height: 220px;
      padding: 0;
      overflow: hidden;
    }

    /* ── Background decoration ── */
    body::before {
      content: '';
      position: fixed;
      top: -60px; right: -60px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, var(--pink-lt) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -40px; left: -40px;
      width: 130px; height: 130px;
      background: radial-gradient(circle, var(--mint-lt) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .popup-wrap {
      position: relative;
      z-index: 1;
      padding: 18px 18px 16px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--peach) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px var(--shadow);
      font-size: 16px;
      flex-shrink: 0;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-3px); }
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .logo-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .logo-sub {
      font-size: 9px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #open-sheet {
      font-family: 'Nunito', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: var(--pink);
      background: var(--pink-lt);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      padding: 4px 10px;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    #open-sheet:hover {
      background: var(--pink);
      color: #fff;
      transform: scale(1.05);
    }

    /* ── Fields ── */
    .fields {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    label {
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding-left: 2px;
    }

    input {
      font-family: 'Nunito', sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 7px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    input::placeholder { color: #D9C5C5; }
    input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px var(--pink-lt);
      transform: translateY(-1px);
    }

    #job-title-input {
      font-size: 14px;
      font-weight: 700;
      padding: 9px 12px;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 10px;
      color: var(--border);
    }

    /* ── CTA ── */
    #shortlist-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--pink) 0%, var(--peach) 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 12px;
      width: 100%;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 14px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    #shortlist-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 7px 20px var(--shadow);
    }
    #shortlist-btn:active:not(:disabled) {
      transform: translateY(0px);
    }
    #shortlist-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    #shortlist-btn .btn-icon { font-size: 15px; }

    /* ── Status ── */
    #status {
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
      letter-spacing: 0.01em;
      transition: all 0.3s;
    }
    #status.success {
      color: var(--mint);
      animation: pop 0.3s ease;
    }
    #status.error { color: var(--pink); }

    @keyframes pop {
      0%   { transform: scale(0.9); opacity: 0; }
      60%  { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── Loading state ── */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 0 20px;
      gap: 10px;
    }
    .loading-dots {
      display: flex;
      gap: 6px;
    }
    .loading-dots span {
      width: 8px; height: 8px;
      background: var(--pink);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; background: var(--peach); }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; background: var(--mint); }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-8px); }
    }
    .loading-text {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    body.loading #loading  { display: flex; }
    body.loading .fields,
    body.loading #shortlist-btn { display: none; }

    /* ── Stagger animation on load ── */
    .field-group {
      animation: slideUp 0.35s ease both;
    }
    .field-group:nth-child(1) { animation-delay: 0.05s; }
    .field-group:nth-child(2) { animation-delay: 0.10s; }
    .field-group:nth-child(3) { animation-delay: 0.15s; }
    .field-group:nth-child(4) { animation-delay: 0.20s; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #shortlist-btn {
      animation: slideUp 0.35s 0.25s ease both;
    }
  </style>
</head>
<body>
<div class="popup-wrap">

  <header>
    <div class="logo">
      <div class="logo-icon">🔖</div>
      <div class="logo-text">
        <span class="logo-title">Shortlist</span>
        <span class="logo-sub">Job tracker</span>
      </div>
    </div>
    <button id="open-sheet">open sheet ↗</button>
  </header>

  <div id="loading">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="loading-text">sniffing job details…</div>
  </div>

  <div class="fields">
    <div class="field-group">
      <label for="job-title-input">✨ Job Title</label>
      <input id="job-title-input" type="text" placeholder="e.g. Senior Product Designer" />
    </div>
    <div class="field-group">
      <label for="company-input">🏢 Company</label>
      <input id="company-input" type="text" placeholder="e.g. Acme Corp" />
    </div>
    <div class="field-group">
      <label for="salary-input">💰 Salary</label>
      <input id="salary-input" type="text" placeholder="e.g. $120k–$150k" />
    </div>
    <div class="row-2">
      <div class="field-group">
        <label for="posted-input">📅 Posted</label>
        <input id="posted-input" type="text" placeholder="2025-03-10" />
      </div>
      <div class="field-group">
        <label for="deadline-input">⏰ Deadline</label>
        <input id="deadline-input" type="text" placeholder="2025-04-01" />
      </div>
    </div>
  </div>

  <button id="shortlist-btn">
    <span class="btn-icon">🌟</span>
    Shortlist This Job
  </button>
  <div id="status"></div>

</div>
<script src="config.js"></script>
<script src="popup.js"></script>
</body>
</html>
